<!DOCTYPE html>
<html>

<head>

    <title>Student Score Predictor</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>📚 Student Score Predictor</h1>

<form action="/predict" method="POST">

<label><b>Enter Study Hours</b></label>

<br><br>

<input
type="number"
name="hours"
step="0.1"
min="0"
max="24"
placeholder="Example: 6.5"
required>

<br><br>

<button class="predict-btn" type="submit">
Predict
</button>

<button class="reset-btn" type="reset">
Reset
</button>

</form>
{% if error %}
<p style="color:red; font-weight:bold;">
    {{ error }}
</p>
{% endif %}

{% if prediction %}

<div class="result">

Based on <b>{{ hours }}</b> study hours,

<br><br>

the predicted score is

<b>{{ prediction }}</b>.

</div>

{% endif %}

<footer>

<hr>

Created by <b>Aniket Singh</b>

<br><br>

GitHub:
<a href="https://github.com/anistar575" target="_blank">
anistar575
</a>

</footer>

</div>

</body>
</html>
